<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eatoria</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../eatoria.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="img/logo1.png" style="border-radius : 50% ;">
    <style>
        .order {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
        }
        .content{
            width: 50%;
            margin: 0 auto;
            margin-top: 120px;
        }
    </style>
</head>

<body>
    <div class="nav-mobile">
        <!-- navbar -->
    </div>

    <!-- side navbar -->
    <div id="overlay" class="overlay-side-nav"></div>
    <div id="sideNavbar" class="side-navbar">
        <!-- sidenavbar -->
    </div>
    <div class="content">
    <h2>Your Orders</h2>
    <div id="orders"></div></div>

  <script src="../eatoria.js"></script>
    <script>
        function loadOrders() {
            let orders = JSON.parse(localStorage.getItem("orders")) || [];
            let container = document.getElementById("orders");

            container.innerHTML = "";

            if (orders.length === 0) {
                container.innerHTML = "<h3>No Orders Yet</h3>";
                return;
            }

            orders.forEach(order => {
                let div = document.createElement("div");
                div.classList.add("order");

                let now = Date.now();
                let diff = now - order.time;

                let remaining = 25 * 60 * 1000 - diff;

                let status = "";

                if (remaining <= 0) {
                    status = "Order Received ✅";
                } else {
                    let mins = Math.floor(remaining / 60000);
                    let secs = Math.floor((remaining % 60000) / 1000);
                    status = `Arriving in ${mins}m ${secs}s`;
                }

                div.innerHTML = `
            <h3>Order ID: ${order.id}</h3>
            <p>Payment: ${order.method}</p>
            <p>${status}</p>
        `;

                container.appendChild(div);
            });
        }

        setInterval(loadOrders, 1000);
        loadOrders();
    </script>
</body>

</html>
