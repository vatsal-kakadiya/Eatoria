<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eatoria</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../eatoria.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="img/logo1.png" style="border-radius : 50% ;">
    <style>
        .orders-container{
            width: 50%;
            margin: 150px auto 40px;
        }
        .orders-container h5{
            font-size: 70px;
            margin-top: 40vh;
            text-align: center;
            color: #ccc;
        }
        .order-item{
            display: flex;
            flex-direction: row;
            position: relative;
            width: 100%;
            height: 100px;
            gap: 20px;
            margin-bottom: 30px;
        }
        .order-item img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }
        .left-part{
            width: 100px;
        }
        .middle-part{
            display: flex;
            flex-direction: column;
            width: 35%;
        }
        .right-part{
            position: absolute;
            display: flex;
            flex-direction: row;
            right: 0;
            width: 350px;
        }
        .quantity, .right-part h3{
            display: flex;
            width: 200px;
            justify-content:left;
            gap: 10px;
            cursor: pointer;
            align-items: center;
        }

        .quantity div{
            background-color: rgb(255, 98, 0);
             border-radius: 15px;
             padding: 3px 6px;
             color: white;
        }
        .minus, .plus{
            border: none;
            cursor: pointer;
            background-color: transparent;
            font-weight: bold;
            color: white;
        }

        h3, p, h2 {
            margin: 0;
            padding: 0;
        }
        h2, h3{
            font-size: 19px;
            font-weight: 500;
        }
        p{
            color: #454545;
        }
        .bill-container{
            width: 70%;
            background-color: #d8d8d8;
            display: flex;
            flex-direction: row;
            margin: 120px auto 40px;
            font-size: 18px;
            padding: 20px 40px;
            position: relative;
            border-radius: 10px
        }
        ul{
            list-style: none;
            margin: 0;
            padding: 0;
        }
        li{
            margin-bottom: 10px;
        }
        li:last-child{
            margin-top : 20px;
        }
        .bill-values{
            position: absolute;
            right: 60px;
        }
        .final-line{
            position: absolute;
            bottom: 65px;
            left: 30px;
            right: 40px;
            height: 0.5px;
            background-color: black;
        }
        .place-order-btn{
            width: 50%;
            margin: 20px auto;
        }
        .place-order-btn button{
            width: 100%;
            border-radius: 40px;
            padding: 12px;
            background-color: rgb(0, 34, 169);
            border: 1px solid black;
            font-size: 16px;
            cursor: pointer;
            color: white;
        }
    </style>
</head> 
<body>
    <div class="nav-mobile">
      <!-- navbar -->
    </div>

    <!-- side navbar -->
    <div id="overlay" class="overlay-side-nav"></div>
    <div id="sideNavbar" class="side-navbar">
    <!-- sidenavbar -->
    </div>

    <div class="orders-container"></div>

    <script src="../eatoria.js"></script>
    <script>
        function loadCart(){
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let container = document.querySelector(".orders-container");

            container.innerHTML = "";

            if(cart.length === 0){
                container.innerHTML = "<h5>Your cart is Empty</h5>";
                return;
            }
            let total = 0;

            cart.forEach(item => {
                let price = parseFloat(item.price.replace("₹",""));
                let item_total = price * item.quantity;
                total += item_total;

                let div = document.createElement("div");
                    div.classList.add("order-item");

                    div.innerHTML = `
                    <div class="left-part"><img src="${item.image}" width="80"></div>
                    <div class="middle-part">
                    <h2>${item.title}</h2>
                    <p>${item.restaurant}</p>
                    </div>
                    <div class="right-part">
                    <h3>₹ ${item_total}</h3>
                    <div class="quantity">Qty: <div><button class="minus">-</button>
                    <span class="qty">${item.quantity}</span>
                    <button class="plus">+</button></div></div>
                    </div>
                    `;
        container.appendChild(div);

        const minusBtn = div.querySelector(".minus");
        const plusBtn = div.querySelector(".plus");
        const qtySpan = div.querySelector(".qty");
        const priceSpan = div.querySelector("h3");

        minusBtn.addEventListener("click", () => {
            if(item.quantity > 1){
                item.quantity--;
            } else {
                cart = cart.filter(c => c.id !== item.id);
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        });

        plusBtn.addEventListener("click", () => {
            if(item.quantity < 10){ 
                item.quantity++;
                localStorage.setItem("cart", JSON.stringify(cart));
                loadCart();
            }
        });
    });

            let bill = document.createElement("div");
            let finalBill = total + 25 + 9;
            bill.classList.add("bill-container");
            bill.innerHTML = `
                <ul class="bill-titles">
                      <li>Cart Total</li>
                      <li>Delivery Fee</li>
                      <li>Packaging Fee</li>
                      <li>Total Bill</li>
                </ul>
                <ul class="bill-values">
                      <li>₹ ${total}</li>
                      <li>₹ 25</li>
                      <li>₹ 9</li>
                      <li>₹ ${finalBill}</li>
                </ul>
                      <div class="final-line"></div>

            `;
            localStorage.setItem("final-bill", finalBill);
            container.appendChild(bill);

            let placeOrder = document.createElement("div");
            placeOrder.classList.add("place-order-btn");
            placeOrder.innerHTML = `
             <button id="place-order">Place Order</button>
            `;
            container.appendChild(placeOrder);

            document.getElementById("place-order").addEventListener("click", () =>{
                window.location.href = "payment.html";
            })
}
        loadCart();
    </script>
</body>
</html>
