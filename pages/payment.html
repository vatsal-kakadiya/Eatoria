<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eatoria</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../eatoria.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="img/logo1.png" style="border-radius : 50% ;">
    <style>
        html, body{
            margin: 0;
            padding: 0;
            overflow-x:hidden;
            overflow-y: hidden;
        }
        h1{
            margin: 0;
            padding: 0;
        }
        .full-canvas{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000000;
            background-color: white;
            transition: 1s ease;
        }
       .loading-wrapper{
          display: flex;
          flex-direction: column;
          width: 20%;
          margin: auto;
          align-items: center;
          margin-top: 280px;
       }
       .loader{
        width: 50px;
        height: 50px;
        border: 5px solid #eee;
        border-top: 5px solid #ff6600;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 10px;
       }

       @keyframes spin {
          0% {transform: rotate(0deg);}
          100% {transform: rotate(360deg);}
       }

       .content{
         width: 40%;
         height: 100%;
         margin: 0 auto;
       }
       .payment-header{
         width: 100%;
         background-color: #ff7e28;
         height: 80px;
         display: flex;
         align-items: center;
       }
       .payment-header h1{
            margin-left: 20px;
            color: white;
       }
       .payment-options div{
          position: relative;
          margin: 16px auto;
          width: 90%;
          height: 50px;
          display: flex;
          align-items: center;
          padding-bottom: 20px;
       }
       .payment-options div:not(:last-child){
          border-bottom: 1px solid rgba(86, 86, 86, 0.336);

       }
       h6{
        font-size: 13.5px;
        color: #ff7316;
        position: absolute;
        right: 20px;
        cursor: pointer;
       }
       
        #cash-btn{
            padding: 6px 13px;
            border-radius: 20px;
            position: absolute;
            right: 25px;
            font-size: 15px;
            border: none;
            background-color: #ff7316;
            color: white;
            cursor: pointer;
        }

       div img{
          width: 35px;
          height: 35px;
       }
       label{
        margin-left: 20px;
       }
       .price{
         width: 100%;
         margin: auto;
         margin-top: 30px;
         font-size: 19px;
         display: flex;
         justify-content: center;
       }
       span{
        font-weight: 600;
        margin-left: 20px;
       }
       input{
        margin-left: 10px
       }
       .trans-btn{
          padding: 9px 23px;
          border-radius: 30px; 
          color: white;
          font-size: 17px;
          border: none;
       }
       #approve-trans{
        background-color: green;
       }
       #cancel-trans{
        background-color: rgba(110, 110, 110, 0.513);
       }

       .timeout{
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        font-size: 15px;
        height: 60px;
       }
       
       .timeout span{
         margin-left: 10px;
         font-size: 19px;
         margin-bottom: -2px;
         color: rgb(0, 0, 174);
       }

       .buttons{
        margin-top: 90px;
        display: flex;
        justify-content: center;
        gap: 70px;
       }
       .buttons button{
         cursor: pointer;
       }

    </style>
</head> 
<body>
    <div class="full-canvas">
        <div class="loading-wrapper">
        <div class="loader"></div>
        <div class="loading-text"></div>
       </div>
    </div>
    <div class="content">
    <div class="payment-header">
        <h1>Eatoria Pay</h1>
    </div>
    <div class="container">
        <div class="bill"></div>
        <div class="payment-options">
            <h3 style="font-weight: 400; font-size: 15px; width: 95%; margin: 45px auto 35px;">Select payment type : </h3>
            <div><img src="../img/phonepe.webp"><label>Phonpe</label><h6>LINK ACCOUNT</h6></div>
            <div><img src="../img/paytm.webp"><label>Paytm</label><h6>LINK ACCOUNT</h6></div>
            <div><img src="../img/gpay.webp" style="height:15px;"><label>G-pay</label><h6>LINK ACCOUNT</h6></div>
            <div><img src="../img/cash.png"><label>Cash on Delivery</label><button id="cash-btn">Pay cash</button></div>
        </div>
    </div>
    <div class="buttons"></div>
    </div>


    <script src="../eatoria.js"></script>
    <script>
        let loadingText = document.getElementsByClassName("loading-text")[0];
        async function loadScreen(){
                loadingText.textContent = "Redirecting to Eatoria Pay";
                let fullCanvas = document.getElementsByClassName("full-canvas")[0];
               await setTimeout(()=>{
               fullCanvas.style.display = "none";
               },3000);
        }
        loadScreen();

        async function canceltr(){
                loadingText.textContent = "Cancelling Payment";
                let fullCanvas = document.getElementsByClassName("full-canvas")[0];
                fullCanvas.style.display = "flex";
               await setTimeout(()=>{
                   window.location.href = "cart.html";
               },3000);
        }


    let finalbill = localStorage.getItem("final-bill");
    let a = document.getElementsByClassName("bill")[0];
    a.innerHTML = `
        <div class="price">Total amonut to Pay : <span>₹ ${finalbill}</span></div>
        <div class="timeout">Timeout in : <span class="remaining"></span></div>
    `;

    let end = new Date().getTime() + 3*60*1000;
    let remaining = document.getElementsByClassName("remaining")[0];

    setInterval(() => {
        let now = new Date().getTime();
        let diff = end - now;
        if(diff <= 0){
            alert("Time's up!");
            window.location.href = "cart.html";
        }
        let minutes = Math.floor(diff / (1000 * 60));
        let seconds = Math.floor((diff % (1000 * 60)) / 1000);
        remaining.innerHTML = `
           <h5>${minutes} : ${seconds.toString().padStart(2,'0')}</h5>
        `;
    }, 1000);

    let buttons = document.getElementsByClassName("buttons")[0];
    buttons.innerHTML = `
        <button class="trans-btn" id="cancel-trans" onclick="canceltr()">Cancel</button>
        <button class="trans-btn" id="approve-trans">Pay ₹${finalbill}</button>
        `;
   </script>
</body>
</html>
