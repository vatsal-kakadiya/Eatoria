<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eatoria</title>
    <link rel="icon" href="img/logo1.png" style="border-radius : 50% ;">    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="eatoria.css">

    <style>
      body{
        background-color: rgba(0, 0, 255, 0.053);
      }
      .back_btn{
        position: relative;
        top: 20px;
        left: 20px;
        padding: 7px;
        /* background-color: rgb(206, 47, 255); */
        border: none;
        cursor: pointer;
        border-radius: 30px;
        width: 70px; 
        background-color: rgba(255, 98, 14, 0.767);
        font-size: 14px;
        color:black;
      }
      .container{
        position: relative;
        width: 65%;
        max-width: 900px;
        display: flex;
        flex-direction: row;
        margin: 12vh auto;
        background-color: #ccc;
        border-radius: 20px;
        height: 67vh;
        overflow: hidden;
      }
      .form-container{
        position: absolute;
        top: 0;
        height: 100%;
        width: 50%;
        transition: all 0.6s ease-in-out;
      }

      .form-container p{
        font-size: 15px ;
        text-align: center;
      }
     
      .login-container{
          left: 0;
          z-index: 2;
      }
      .signup-container{
          left: 0;
          opacity: 0;
          z-index: 1;
      }
      .container.right-panel-active .login-container{
        transform: translateX(100%);
        opacity: 0;
      }
      .container.right-panel-active .signup-container{
        transform: translateX(100%);
        opacity: 1;
        z-index: 5;
      }

      .overlay-container{
        position: absolute;
        top: 0;
        left: 50%;
        width: 50%;
        height: 100%;
        overflow: hidden;
        transition: transform 0.6s ease-in-out;
        z-index: 100;
      }
      .overlay{
        color: white;
        position: relative;
        left: -100%;
        height: 100%;
        width: 200%;
        transform: translateX(0);
        transition: transform 0.6s ease-in-out;
      }

      .container.right-panel-active .overlay-container{
        transform: translateX(-100%);
      }
      .container.right-panel-active .overlay{
        transform: translateX(50%);
      }
      
      .overlay-panel{
         position: absolute;
         width: 50%;
         height: 100%;
         display: flex;
         align-items: center;
         justify-content: center;
         background-color: white;
      }
      .overlay-panel img{
        width: 100%;
      }
      .overlay-left img{
        width: 90%;
        height: 90%;
      }
      /* .overlay-left{
         transform: translateX(-25%);
      } */
      .overlay-right{
         right: 0;
         z-index: 100;
      }
      form{
        background-color: #ffaa00d3;
        display: flex;
        flex-direction: column;
        padding: 70px 40px;
        height: 100%;
      }

      input{
        margin: 5px 0;
        padding: 10px;
        border-radius: 25px;
        border: 0.1px solid black;
      }
      form button{
        padding: 10px;
        background-color: black;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 30px;
        width: 100px;
        margin: 0 auto;
        margin-top: 20px;
      }
     span{
      color: rgb(18, 18, 218);
      cursor: pointer;
      font-size: 14px ;
     }

    </style>
 </head>
<body>
  <button class="back_btn" onclick="history.back()">← Back</button>
    <div class="container" id="container">
      <div class="form-container login-container">
           <form id="loginForm">
            <h1>Login</h1>
            <input type="email" placeholder="Email" id="email">
            <input type="password" placeholder="Password" id="password">
            <button type="submit">Login</button>
            <p>First time? <span id="showSignup">Signup</span></p>
           </form>
      </div>
      <div class="form-container signup-container">
                <form id="signupForm">
                  <h1>Signup</h1>
                  <input type="text" placeholder="Name" id="s-name">
                  <input type="email" placeholder="Email" id="s-email">
                  <input type="password" placeholder="Password" id="s-password">
                  <button type="submit">Signup</button>
                  <p>Already registered? <span id="showLogin">Login</span></p>
                </form>
      </div>

      <div class="overlay-container">
        <div class="overlay">
          <div class="overlay-panel overlay-left">
            <img src="img/img3.png" alt="">
          </div>
          <div class="overlay-panel overlay-right">
            <img src="img/img4.png" alt="">
          </div>
        </div>
      </div>
    </div>

    <script>
      const container = document.getElementById("container");
      const showSignup = document.getElementById("showSignup");
      const showLogin = document.getElementById("showLogin");

      showSignup.addEventListener("click", ()=>{
        container.classList.add("right-panel-active");
      });
      showLogin.addEventListener("click", ()=>{
        container.classList.remove("right-panel-active");
      });
    </script>
    <script src="eatoria.js"></script>
</body>
</html>
